<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Integration Example</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <h1>Razorpay Payment Integration</h1>
    
    <div id="payment-form">
        <h2>Create Payment</h2>
        <form id="create-payment-form">
            <div>
                <label for="amount">Amount (₹):</label>
                <input type="number" id="amount" name="amount" value="100" required>
            </div>
            <div>
                <label for="customerName">Customer Name:</label>
                <input type="text" id="customerName" name="customerName" value="John Doe" required>
            </div>
            <div>
                <label for="customerEmail">Customer Email:</label>
                <input type="email" id="customerEmail" name="customerEmail" value="john@example.com" required>
            </div>
            <div>
                <label for="customerPhone">Customer Phone:</label>
                <input type="tel" id="customerPhone" name="customerPhone" value="9876543210" required>
            </div>
            <button type="submit">Create Payment</button>
        </form>
    </div>

    <div id="payment-status" style="display: none;">
        <h3>Payment Status</h3>
        <p id="status-message"></p>
    </div>

    <script>
        // Replace with your actual API endpoint
        const API_BASE_URL = 'http://localhost:3000/api/payments';
        
        // Function to create payment
        async function createPayment(paymentData) {
            try {
                const response = await fetch(`${API_BASE_URL}/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer YOUR_JWT_TOKEN_HERE' // Replace with actual token
                    },
                    body: JSON.stringify(paymentData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    return result.data;
                } else {
                    throw new Error(result.message || 'Failed to create payment');
                }
            } catch (error) {
                console.error('Error creating payment:', error);
                throw error;
            }
        }

        // Function to handle Razorpay payment
        function handleRazorpayPayment(razorpayOrder) {
            const options = {
                key: razorpayOrder.key,
                amount: razorpayOrder.amount,
                currency: razorpayOrder.currency,
                name: 'Your Company Name',
                description: 'Payment for services',
                order_id: razorpayOrder.id,
                handler: function (response) {
                    // Payment successful
                    console.log('Payment successful:', response);
                    verifyPayment(razorpayOrder.id, response.razorpay_payment_id, response.razorpay_signature);
                },
                prefill: {
                    name: document.getElementById('customerName').value,
                    email: document.getElementById('customerEmail').value,
                    contact: document.getElementById('customerPhone').value
                },
                theme: {
                    color: '#3399cc'
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        }

        // Function to verify payment
        async function verifyPayment(orderId, paymentId, signature) {
            try {
                const response = await fetch(`${API_BASE_URL}/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer YOUR_JWT_TOKEN_HERE' // Replace with actual token
                    },
                    body: JSON.stringify({
                        orderId,
                        paymentId,
                        signature
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('Payment verified successfully!', 'success');
                } else {
                    showStatus('Payment verification failed: ' + result.message, 'error');
                }
            } catch (error) {
                console.error('Error verifying payment:', error);
                showStatus('Error verifying payment', 'error');
            }
        }

        // Function to show status
        function showStatus(message, type) {
            const statusDiv = document.getElementById('payment-status');
            const statusMessage = document.getElementById('status-message');
            
            statusMessage.textContent = message;
            statusMessage.style.color = type === 'success' ? 'green' : 'red';
            statusDiv.style.display = 'block';
        }

        // Handle form submission
        document.getElementById('create-payment-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                amount: parseFloat(document.getElementById('amount').value),
                customerName: document.getElementById('customerName').value,
                customerEmail: document.getElementById('customerEmail').value,
                customerPhone: document.getElementById('customerPhone').value
            };

            try {
                const paymentData = await createPayment(formData);
                console.log('Payment created:', paymentData);
                
                // Use the Razorpay order data to open payment
                if (paymentData.razorpayOrder) {
                    handleRazorpayPayment(paymentData.razorpayOrder);
                } else {
                    // Fallback to direct URL if needed
                    window.open(paymentData.paymentUrl, '_blank');
                }
            } catch (error) {
                showStatus('Error creating payment: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
